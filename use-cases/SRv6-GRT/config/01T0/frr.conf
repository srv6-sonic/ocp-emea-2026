frr defaults traditional
hostname 01T0
!
log stdout notifications
log commands
!
no fpm use-next-hop-groups
!
fpm address 127.0.0.1
zebra nexthop-group keep 1
!
ipv6 route fcbb:bbbb:A001::/48 2001:db8:1:A001::A001
!
! Inter-leaf policy: do not advertise local locator routes to the remote leaf.
ipv6 prefix-list PL_T0_TO_REMOTE_T0_OUT seq 10 deny fcbb:bbbb:1::/48
ipv6 prefix-list PL_T0_TO_REMOTE_T0_OUT seq 20 deny fcbb:bbbb:1::1/128
ipv6 prefix-list PL_T0_TO_REMOTE_T0_OUT seq 255 permit any
route-map RM_T0_TO_REMOTE_T0_OUT permit 10
 match ipv6 address prefix-list PL_T0_TO_REMOTE_T0_OUT
exit
!
! Spine policy: keep host loopback export local to its leaf.
ipv6 prefix-list PL_T0_TO_SPINES_OUT seq 10 deny fcbb:bbbb:A001::/48
ipv6 prefix-list PL_T0_TO_SPINES_OUT seq 255 permit any
route-map RM_T0_TO_SPINES_OUT permit 10
 match ipv6 address prefix-list PL_T0_TO_SPINES_OUT
exit
!
! Apply SID export only for the host subnet prefix.
ipv6 prefix-list PL_SID_EXPORT_DT46_V6 seq 10 permit fcbb:bbbb:A001::/48
route-map RM_SID_EXPORT_DT46 permit 10
 match ipv6 address prefix-list PL_SID_EXPORT_DT46_V6
exit
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 no bgp network import-check
 bgp bestpath as-path multipath-relax
 ! Uplink from 01T0 to spine 01T1 (AS 65011)
 neighbor 2001:db8:1:1001::1001 remote-as 65011
 neighbor 2001:db8:1:1001::1001 timers 3 10
 neighbor 2001:db8:1:1001::1001 timers connect 1
 neighbor 2001:db8:1:1001::1001 capability extended-nexthop
 neighbor 2001:db8:1:1001::1001 disable-connected-check
 ! Uplink from 01T0 to spine 02T1 (AS 65012)
 neighbor 2001:db8:1:1002::1002 remote-as 65012
 neighbor 2001:db8:1:1002::1002 timers 3 10
 neighbor 2001:db8:1:1002::1002 timers connect 1
 neighbor 2001:db8:1:1002::1002 capability extended-nexthop
 neighbor 2001:db8:1:1002::1002 disable-connected-check
 ! Overlay eBGP peer from 01T0 to remote leaf 02T0 loopback
 neighbor fcbb:bbbb:2::1 remote-as 65002
 neighbor fcbb:bbbb:2::1 timers 3 10
 neighbor fcbb:bbbb:2::1 timers connect 1
 neighbor fcbb:bbbb:2::1 capability extended-nexthop
 neighbor fcbb:bbbb:2::1 disable-connected-check
 neighbor fcbb:bbbb:2::1 update-source fcbb:bbbb:1::1
 neighbor fcbb:bbbb:2::1 ebgp-multihop
 !
 segment-routing srv6
  locator MAIN
  encap-behavior H_Encaps_Red
 exit
 !
 address-family ipv6 unicast
  network fcbb:bbbb:1::/48
  network fcbb:bbbb:1::1/128
  network fcbb:bbbb:A001::/48
  ! Export routes toward T1 uplinks; filter local host /48.
  neighbor 2001:db8:1:1001::1001 activate
  neighbor 2001:db8:1:1001::1001 route-map RM_T0_TO_SPINES_OUT out
  neighbor 2001:db8:1:1002::1002 activate
  neighbor 2001:db8:1:1002::1002 route-map RM_T0_TO_SPINES_OUT out
  ! Export routes toward remote leaf with overlay SID attributes.
  neighbor fcbb:bbbb:2::1 activate
  neighbor fcbb:bbbb:2::1 route-map RM_T0_TO_REMOTE_T0_OUT out
  neighbor fcbb:bbbb:2::1 encapsulation-srv6
  sid export auto behavior dt46 route-map RM_SID_EXPORT_DT46
 exit-address-family
exit
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix fcbb:bbbb:1::/48
    format usid-f3216
   exit
  exit
  !
  encapsulation
   source-address fcbb:bbbb:1::1
  exit
 exit
exit
!
ip forwarding
ipv6 forwarding
!
line vty
!
