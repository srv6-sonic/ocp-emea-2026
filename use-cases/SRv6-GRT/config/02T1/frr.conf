frr defaults traditional
hostname 02T1
!
log stdout notifications
log commands
!
no fpm use-next-hop-groups
!
fpm address 127.0.0.1
zebra nexthop-group keep 1
!
router bgp 65012
 bgp router-id 12.12.12.12
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 no bgp network import-check
 bgp bestpath as-path multipath-relax
 ! eBGP downlink to leaf 01T0 (AS 65001)
 neighbor 2001:db8:1:1002::1 remote-as 65001
 neighbor 2001:db8:1:1002::1 timers 3 10
 neighbor 2001:db8:1:1002::1 timers connect 1
 neighbor 2001:db8:1:1002::1 capability extended-nexthop
 neighbor 2001:db8:1:1002::1 disable-connected-check
 ! eBGP downlink to leaf 02T0 (AS 65002)
 neighbor 2001:db8:2:1002::2 remote-as 65002
 neighbor 2001:db8:2:1002::2 timers 3 10
 neighbor 2001:db8:2:1002::2 timers connect 1
 neighbor 2001:db8:2:1002::2 capability extended-nexthop
 neighbor 2001:db8:2:1002::2 disable-connected-check
 !
 segment-routing srv6
  locator MAIN
  encap-behavior H_Encaps_Red
 exit
 !
 address-family ipv6 unicast
  network fcbb:bbbb:1002::/48
  network fcbb:bbbb:1002::1/128
  neighbor 2001:db8:1:1002::1 activate
  neighbor 2001:db8:2:1002::2 activate
 exit-address-family
exit
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix fcbb:bbbb:1002::/48
    format usid-f3216
   exit
  exit
  !
  encapsulation
   source-address fcbb:bbbb:1002::1
  exit
 exit
exit
!
ip forwarding
ipv6 forwarding
!
line vty
!
